services:
  postgres:
    image: postgres:16-alpine
    container_name: aeromx-postgres
    environment:
      POSTGRES_USER: aeromx
      POSTGRES_PASSWORD: aeromx123
      POSTGRES_DB: aeromx
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: aeromx-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
